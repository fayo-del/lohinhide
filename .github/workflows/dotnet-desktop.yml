name: Build & Publish Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Get version
        id: version
        run: echo "version=1.0.0.0" >> $GITHUB_OUTPUT

      - name: Compute MD5
        id: md5
        run: |
          MD5=$(md5sum bin/Release/net8.0/Jellyfin.Plugin.PrivateBranding.dll | awk '{print $1}')
          echo "md5=$MD5" >> $GITHUB_OUTPUT

      - name: Generate manifest
        run: |
          cat > manifest.json << EOF
          [
            {
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "Private Branding",
              "description": "Hides custom branding from unauthenticated users. Branding is only visible after login.",
              "overview": "Intercepts the /Branding/Configuration endpoint and returns empty branding to unauthenticated requests.",
              "owner": "fayo-del",
              "category": "General",
              "imageUrl": "",
              "versions": [
                {
                  "version": "${{ steps.version.outputs.version }}",
                  "changelog": "Initial release.",
                  "targetAbi": "10.10.0.0",
                  "sourceUrl": "https://github.com/fayo-del/lohinhide/releases/download/v${{ steps.version.outputs.version }}/Jellyfin.Plugin.PrivateBranding.dll",
                  "checksum": "${{ steps.md5.outputs.md5 }}",
                  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                }
              ]
            }
          ]
          EOF

      - name: Delete existing release
        run: gh release delete v${{ steps.version.outputs.version }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            bin/Release/net8.0/Jellyfin.Plugin.PrivateBranding.dll \
            manifest.json \
            --title "Private Branding v${{ steps.version.outputs.version }}" \
            --notes "Hides custom branding from unauthenticated users."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
