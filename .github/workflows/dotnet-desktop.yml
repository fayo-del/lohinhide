name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build --configuration Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.PrivateBranding
          path: bin/Release/net8.0/Jellyfin.Plugin.PrivateBranding.dll
